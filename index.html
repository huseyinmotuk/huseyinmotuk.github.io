<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TileIQ - Okey & Rummikub Skor Tutucu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    min-height: 100vh;
    line-height: 1.6;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 60px 24px; }
  .icon {
    width: 96px; height: 96px; border-radius: 22px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: bold; margin: 0 auto 24px;
    box-shadow: 0 8px 24px rgba(118, 75, 162, 0.4);
  }
  h1 { font-size: 36px; text-align: center; margin-bottom: 8px; }
  .tagline { text-align: center; color: #a0a0c0; margin-bottom: 40px; font-size: 17px; }
  .description {
    background: rgba(255,255,255,0.05); padding: 24px; border-radius: 12px;
    margin-bottom: 32px; font-size: 15px; color: #d0d0e0;
  }
  .stores {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .store-btn {
    background: #fff; color: #1a1a2e; padding: 14px 28px; border-radius: 12px;
    text-decoration: none; font-weight: 600; display: inline-flex;
    align-items: center; gap: 10px; transition: transform 0.2s;
    min-width: 200px; justify-content: center;
  }
  .store-btn:hover { transform: translateY(-2px); }
  .store-btn span { font-size: 17px; }
  .links {
    display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
    padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .links a { color: #8090d0; text-decoration: none; font-size: 14px; }
  .links a:hover { color: #fff; }
  footer { text-align: center; margin-top: 40px; color: #606080; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">T</div>
  <h1>TileIQ</h1>
  <p class="tagline">Okey & 101 Skor Tutucu</p>

  <div class="description">
    101 Okey, Klasik Okey ve Rummikub için akıllı skor tutucu.
    Otomatik puanlama, tam maç geçmişi ve PDF dışa aktarımı ile
    kalem kâğıdı bırakın.
  </div>

  <div class="stores">
    <a class="store-btn" href="https://apps.apple.com/app/id6766692446">
      <span>App Store</span>
    </a>
    <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.tileiq.app">
      <span>Google Play</span>
    </a>
  </div>

  <div class="links">
    <a href="https://huseyinmotuk.github.io/tileiq-legal/privacy-policy.html">Gizlilik Politikası</a>
    <a href="https://huseyinmotuk.github.io/tileiq-legal/support.html">Destek</a>
    <a href="mailto:mothenox46@gmail.com">İletişim</a>
  </div>

  <footer>
    © 2026 Hüseyin Motuk · MothenoX
  </footer>
</div>
</body>
</html>
